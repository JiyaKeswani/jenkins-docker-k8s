apiVersion: apps/v1
kind: Deployment
metadata:
  name: jiya-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jiya
      version: green
  template:
    metadata:
      labels:
        app: jiya
        version: green
    spec:
      containers:
      - name: jiya-container
        image: jiya2022/app:v2
        ports:
        - containerPort: 3000
